<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zgadnij imię bejbika!</title>
    <style>
        :root {
            /* Nowa paleta niebieska */
            --primary: #3498db; /* Główny niebieski */
            --primary-dark: #2980b9; /* Ciemniejszy niebieski do hoverów */
            --bg: #e3f2fd; /* Bardzo jasny niebieski tła */
            --text: #2c3e50; /* Ciemny niebiesko-szary tekst */
            --border: #bbdefb; /* Jasnoniebieskie obramowanie */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(52, 152, 219, 0.1);
            width: 90%;
            max-width: 420px;
            text-align: center;
            border: 1px solid var(--border);
        }

        h1 { color: var(--primary); margin-bottom: 0.5rem; margin-top: 0; }
        p { margin-bottom: 2rem; font-size: 1rem; opacity: 0.9; }

        .input-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }

        label { display: block; margin-bottom: 0.5rem; font-weight: bold; font-size: 0.9rem; color: var(--primary-dark); }

        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            box-sizing: border-box;
            transition: all 0.3s;
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.15);
        }

        input::placeholder {
            color: #b0bec5;
        }

        button {
            width: 100%;
            padding: 16px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
            box-shadow: 0 4px 6px rgba(52, 152, 219, 0.2);
        }

        button:hover {
            background-color: var(--primary-dark);
        }

        button:active {
            transform: scale(0.98);
            box-shadow: 0 2px 3px rgba(52, 152, 219, 0.2);
        }

        button:disabled {
            background-color: #b0bec5;
            cursor: not-allowed;
            box-shadow: none;
        }

        #message { 
            margin-top: 1.5rem; 
            font-weight: bold; 
            display: none; 
            padding: 15px;
            border-radius: 10px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

<div class="container" id="app">
    <h1>💙 Zgadnij imię bejbika!</h1>
    <p>To chłopiec! Jak myślisz, jakie imię wybraliśmy?</p>
    
    <div id="form-container">
        <div class="input-group">
            <label for="userName">Twoje imię (Kto zgaduje?)</label>
            <input type="text" id="userName" placeholder="" required>
        </div>

        <div class="input-group">
            <label for="guess">Typowane imię chlopca</label>
            <input type="text" id="guess" placeholder="" required>
        </div>

        <button id="submitBtn" onclick="sendVote()">Wysyłam typ! 🚀</button>
    </div>

    <div id="message"></div>
</div>

<script>
    // Tu wklej swój URL z wdrożenia Google Apps Script
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxmKJy9dV6WVRNhBtYWHDHR8iT3KApQXi0X9AVd4azUwdalP7trJ8z6Z9VEi4ICEgk_IA/exec'; 
    const msgDiv = document.getElementById('message');
    const formContainer = document.getElementById('form-container');

    // 1. Sprawdzanie czy już głosował (LocalStorage)
    window.onload = () => {
        if (localStorage.getItem('has_voted_bejbik_boy')) {
            showSuccess('Dzięki! Twoje typowanie jest już bezpieczne w bazie. 👶');
        }
    };

    // 2. Unikalne ID urządzenia (proste zabezpieczenie)
    let deviceId = localStorage.getItem('device_id_boy');
    if (!deviceId) {
        deviceId = 'dev-b-' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('device_id_boy', deviceId);
    }

    async function sendVote() {
        const userName = document.getElementById('userName').value;
        const guess = document.getElementById('guess').value;
        const btn = document.getElementById('submitBtn');

        if (!userName || !guess) {
            alert('Proszę, wypełnij oba pola przed wysłaniem! 😊');
            return;
        }

        btn.disabled = true;
        btn.innerText = 'Wysyłanie...';

        try {
            // Apps Script przy CORS POST działa najlepiej z mode: 'no-cors'
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', 
                cache: 'no-cache',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ userName, guess, deviceId })
            });

            // Ponieważ no-cors nie zwraca odpowiedzi, zakładamy sukces po wysłaniu
            localStorage.setItem('has_voted_bejbik_boy', 'true');
            showSuccess('Głos przyjęty! Teraz czekamy na rozwiązanie... 🎉');
            
        } catch (error) {
            console.error('Błąd:', error);
            alert('Ups! Coś poszło nie tak z serwerami Google. Spróbuj za chwilę.');
            btn.disabled = false;
            btn.innerText = 'Wysyłam typ! 🚀';
        }
    }

    function showSuccess(text) {
        formContainer.style.display = 'none';
        msgDiv.innerText = text;
        msgDiv.style.display = 'block';
        msgDiv.style.color = '#27ae60'; // Zielony kolor sukcesu
        msgDiv.style.backgroundColor = '#eafaf1'; // Jasnozielone tło
        msgDiv.style.border = '1px solid #d4efdf';
    }
</script>

</body>
</html>
