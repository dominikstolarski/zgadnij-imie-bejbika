<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zgadnij imię bejbika!</title>
    <style>
        :root {
            --primary: #ff85a2;
            --bg: #fdf6f8;
            --text: #4a4a4a;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        h1 { color: var(--primary); margin-bottom: 0.5rem; }
        p { margin-bottom: 1.5rem; font-size: 0.9rem; }

        .input-group {
            margin-bottom: 1rem;
            text-align: left;
        }

        label { display: block; margin-bottom: 0.3rem; font-weight: bold; font-size: 0.85rem; }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #eee;
            border-radius: 10px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            margin-top: 1rem;
        }

        button:active { transform: scale(0.98); }
        button:disabled { background-color: #ccc; cursor: not-allowed; }

        #message { margin-top: 1rem; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="container" id="app">
    <h1>🍼 Zgadnij imię bejbika!</h1>
    <p>Jak myślisz, jakie imię wybraliśmy?</p>
    
    <div id="form-container">
        <div class="input-group">
            <label for="userName">Kto zgaduje? (Twój podpis)</label>
            <input type="text" id="userName" placeholder="np. Ciocia Grażynka" required>
        </div>

        <div class="input-group">
            <label for="guess">Twoje typowane imię</label>
            <input type="text" id="guess" placeholder="np. Amelia lub Antoni" required>
        </div>

        <button id="submitBtn" onclick="sendVote()">Obstawiam! 🚀</button>
    </div>

    <div id="message"></div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxmKJy9dV6WVRNhBtYWHDHR8iT3KApQXi0X9AVd4azUwdalP7trJ8z6Z9VEi4ICEgk_IA/exec';
    const msgDiv = document.getElementById('message');
    const formContainer = document.getElementById('form-container');

    // 1. Sprawdzanie czy już głosował
    window.onload = () => {
        if (localStorage.getItem('has_voted_bejbik')) {
            showSuccess('Dzięki! Twoje typowanie jest już w bazie. 👶');
        }
    };

    // 2. Unikalne ID urządzenia (proste)
    let deviceId = localStorage.getItem('device_id');
    if (!deviceId) {
        deviceId = 'dev-' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('device_id', deviceId);
    }

    async function sendVote() {
        const userName = document.getElementById('userName').value;
        const guess = document.getElementById('guess').value;
        const btn = document.getElementById('submitBtn');

        if (!userName || !guess) {
            alert('Wypełnij oba pola! 😊');
            return;
        }

        btn.disabled = true;
        btn.innerText = 'Wysyłanie...';

        try {
            // Apps Script przy CORS POST ma swoje humory, 
            // więc wysyłamy jako text/plain jeśli nie używasz bibliotek typu Axios
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', 
                cache: 'no-cache',
                body: JSON.stringify({ userName, guess, deviceId })
            });

            // Ponieważ no-cors nie zwraca odpowiedzi, zakładamy sukces
            localStorage.setItem('has_voted_bejbik', 'true');
            showSuccess('Głos wysłany! Powodzenia! 🎉');
            
        } catch (error) {
            console.error('Błąd:', error);
            alert('Coś poszło nie tak. Spróbuj później.');
            btn.disabled = false;
            btn.innerText = 'Obstawiam! 🚀';
        }
    }

    function showSuccess(text) {
        formContainer.style.display = 'none';
        msgDiv.innerText = text;
        msgDiv.style.display = 'block';
        msgDiv.style.color = '#2ecc71';
    }
</script>

</body>
</html>
